[Distribution]
Distribution=fedora
Release=43
Architecture=x86-64

[Output]
Format=disk
Output=fedora-kvm
ManifestFormat=json
RepartDirectories=mkosi.repart

[Content]
SkeletonTrees=mkosi.extra
Bootable=yes
Bootloader=systemd-boot
FinalizeScripts=finalize-image.sh.chroot
Timezone=UTC
Locale=en_us.UTF-8
Keymap=us
InitrdPackages=
	dracut
	dracut-network
	kernel-modules
	kernel-modules-extra

Packages=
	kernel
	systemd
	systemd-boot
	systemd-ukify
	dracut
	udev
	util-linux
	iproute
	NetworkManager
	openssh-server
	bash
	coreutils

RootPassword=mkosi

[Partitions]
RootLabel=root

KernelCommandLine=
	console=ttyS0
	console=tty0
	rd.systemd.show_status=true

[Runtime]
Firmware=uefi

