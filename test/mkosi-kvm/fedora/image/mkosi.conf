[Distribution]
Distribution=fedora
Release=43
Architecture=x86-64

[Output]
Format=disk
Output=fedora-kvm
ManifestFormat=json
RepartDirectories=mkosi.repart

[Content]
SkeletonTrees=mkosi.extra
Bootable=yes
Bootloader=systemd-boot
Initrds=vm-planes-initrd.cpio
FinalizeScripts=finalize-image.sh.chroot
Timezone=UTC
Locale=en_us.UTF-8
Keymap=us
InitrdPackages=
	dracut
	dracut-network

Packages=
	bash
	coreutils
	dracut
	iproute
	kexec-tools
	NetworkManager
	openssh-server
	systemd
	systemd-boot
	systemd-ukify
	udev
	util-linux
	vim
	which

RootPassword=mkosi

[Partitions]
RootLabel=root

KernelCommandLine=
    earlycon=uart8250,io,0x3f8,115200n8
	console=tty0
	root=/dev/vda2
	rw
	rd.systemd.show_status=true
	enable-vm-planes=1

KernelModulesInitrd=yes
KernelModulesInitrdInclude=
        virtio
        virtio_pci
        virtio_blk
        virtio_scsi
        virtio_net
        virtio_console
        virtio_ring
        sd_mod
        ahci
        ata_piix
        e1000
        e1000e
        ext4
        vfat
        xfs
