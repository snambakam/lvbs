[Distribution]
Distribution=azure
Release=3.0
Architecture=x86-64

[Build]
Environment=SYSTEMD_REPART_MKFS_OPTIONS_EXT4="-L root"

[Content]
SkeletonTrees=mkosi.skeleton
Bootable=yes
Bootloader=systemd-boot

Packages=
  systemd
  systemd-boot
  systemd-udev
  systemd-networkd
  systemd-resolved
  kernel
  kernel-tools
  grub2-efi
  hyperv-daemons
  shim
  cloud-init
  WALinuxAgent
  dracut
  lvm2
  e2fsprogs
  parted
  iproute
  openssh-server
  sudo
  ca-certificates

RootPassword=azurelinux

KernelCommandLine=console=ttyS0 root=LABEL=root rw systemd.unified_cgroup_hierarchy=1 cgroup_no_v1=all rd.modules_load=ext4

[Partition]
RootPartitionLabel=root

[Output]
Format=disk
ManifestFormat=json
FinalizeScript=finalize-image.sh.chroot

[Runtime]
Firmware=uefi
SecureBoot=no

