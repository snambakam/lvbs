[Distribution]
Distribution=azure
Release=3.0
Architecture=x86-64

[Content]
SkeletonTrees=mkosi.skeleton
Bootable=yes
Bootloader=systemd-boot
Packages=
  systemd
  systemd-boot
  systemd-udev
  systemd-networkd
  systemd-resolved
  kernel
  kernel-tools
  grub2-efi
  hyperv-daemons
  shim
  cloud-init
  WALinuxAgent
  dracut
  lvm2
  e2fsprogs
  parted
  iproute
  openssh-server
  sudo
  ca-certificates

InitrdPackages=
  systemd
  dracut
  kernel

KernelCommandLine=console=ttyS0 root=LABEL=root rw systemd.unified_cgroup_hierarchy=1

[Output]
Format=disk
ManifestFormat=json

[Runtime]
Firmware=uefi
SecureBoot=no
